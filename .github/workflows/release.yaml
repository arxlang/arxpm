name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install build twine

      - name: Run release dry build
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: python -m build

      - name: Release command
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m build
          python -m twine upload \
            --username __token__ \
            --password "${PYPI_TOKEN}" \
            dist/*

      - name: Generate documentation with release artifacts
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          rm -rf build
          mkdir -p build
          cp README.md build/index.md

      - name: GitHub Pages action
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: peaceiris/actions-gh-pages@v3.5.9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
