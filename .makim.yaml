groups:
  default:
    tasks:
      clean:
        help: remove build artifacts and cache files
        backend: bash
        run: |
          rm -fr build/
          rm -fr dist/
          rm -fr .eggs/
          find . -name '*.egg-info' -exec rm -fr {} +
          find . -name '*.egg' -exec rm -f {} +
          find . -name '*.pyc' -exec rm -f {} +
          find . -name '__pycache__' -exec rm -fr {} +
          find . -name '*.pyo' -exec rm -f {} +
          find . -name '*~' -exec rm -f {} +
          rm -f .coverage
          rm -fr htmlcov/
          rm -fr .pytest_cache

  tests:
    tasks:
      linter:
        help: run linter and type checks
        run: |
          pre-commit install
          pre-commit run --all-files

      unit:
        help: run unit tests
        args:
          path:
            help: Specify the location of the tests
            type: string
            default: "tests"
          params:
            help: Specify parameters to be used for tests
            type: string
            default: "-q"
        backend: bash
        run: |
          pytest -vv \
            --cov=arxpm \
            --cov-fail-under=84 \
            --cov-report=term-missing \
            --no-cov-on-fail \
            ${{ args.path }} \
            ${{ args.params }}

      smoke:
        help: run smoke tests for examples
        backend: bash
        run: |
          set -euo pipefail

          if ! command -v pixi >/dev/null 2>&1; then
            echo "pixi is required for tests.smoke"
            echo "hint: activate/update conda dev env from conda/dev.yaml"
            exit 1
          fi
          if ! command -v arx >/dev/null 2>&1; then
            echo "arx is required for tests.smoke"
            echo "hint: run poetry install --with dev in the active env"
            exit 1
          fi

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT

          for example_dir in examples/*/; do
            example_name="$(basename "${example_dir}")"
            cp -r "${example_dir}" "${tmp_dir}/${example_name}"
          done

          for example_dir in examples/*/; do
            example_name="$(basename "${example_dir}")"
            project_dir="${tmp_dir}/${example_name}"
            echo "=== smoke: ${example_name} ==="

            python -m arxpm doctor --directory "${project_dir}"
            python -m arxpm install --directory "${project_dir}"
            python -m arxpm build --directory "${project_dir}"
            python -m arxpm run --directory "${project_dir}"
          done

      ci:
        help: run the same checks executed on CI
        hooks:
          pre-run:
            - task: tests.unit
            - task: tests.smoke
            - task: tests.linter

  docs:
    tasks:
      build:
        help: build documentation artifacts
        run: |
          mkdocs build --config-file mkdocs.yaml

      preview:
        help: preview documentation page locally
        run: mkdocs serve --watch docs --config-file mkdocs.yaml

  release:
    vars:
      app: |
        npx --yes \
          -p semantic-release \
          -p conventional-changelog-conventionalcommits \
          -p "@semantic-release/commit-analyzer" \
          -p "@semantic-release/release-notes-generator" \
          -p "@semantic-release/changelog" \
          -p "@semantic-release/exec" \
          -p "@semantic-release/github" \
          -p "@semantic-release/git" \
          -p "@google/semantic-release-replace-plugin" \
          semantic-release

    tasks:
      dry:
        help: run semantic release in dry-run mode
        run: ${{ vars.app }} --dry-run

      ci:
        help: run semantic release on CI
        run: ${{ vars.app }} --ci
